<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunț Site</title>
    <style>
        /* Stil general iOS 8 inspired */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Logo */
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 30px;
        }

        /* Titlu */
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 15px;
        }

        /* Text secundar */
        p {
            font-size: 16px;
            color: #555;
            margin: 0 20px;
        }

        /* Buton iOS 8 style */
        .btn {
            margin-top: 30px;
            background-color: #007aff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>

    <!-- Logo: înlocuiește "logo.png" cu fișierul tău -->
    <img src="logo.png" alt="Logo" class="logo">

    <h1>DE CE SE PUNE ÎN PAUZĂ...</h1>
    <p>1. MIRUNICA</p>
    <p>2. LIPSĂ DE TIMP</p>

    <button class="btn" onclick="alert('O SĂ VEZI CEVA FRUMOS, LOL')">CE...?</button>

</body>
</html>
