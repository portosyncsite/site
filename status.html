<!DOCTYPE html>
<html lang="ro">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>portoSYNC</title>

<style>

@font-face {
  font-family: 'PortoSyncMedium';
  src: url('http://prtsync.ro/AeonikProBold.ttf') format('truetype');
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'PortoSyncMedium';
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f4f6f8;
color:#222;
}

.wrapper{
width:90%;
max-width:750px;
}

.card{
background:white;
border-radius:20px;
padding:35px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
height:60px;
}

h1{
text-align:center;
margin-bottom:15px;
}

p{
text-align:center;
margin-bottom:25px;
color:#555;
}

/* PROGRESS */

.progress-bar{
width:100%;
height:14px;
background:#e5e7eb;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#111;
transition:0.4s;
}

/* STEPS */

.steps{
margin-top:20px;
}

.step{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
font-size:15px;
}

.step:last-child{
border:none;
}

.check{
opacity:0.2;
transition:0.3s;
}

.done .check{
opacity:1;
color:green;
}

/* BUTTON */

.button{
display:block;
text-align:center;
margin-top:25px;
padding:12px;
border-radius:12px;
background:#ccc;
color:#666;
cursor:not-allowed;
}

/* FOOTER */

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#888;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="card">

<div class="logo">
<img src="http://prtsync.ro/PortoSync.png">
</div>

<h1>Status portoSYNC</h1>

<p>Site-ul este în reconstrucție.</p>

<div class="progress-bar">
  <div class="progress-fill" id="bar"></div>
</div>

<div class="steps">

<div class="step" data-step="25">
  Securitate
  <span class="check">✔</span>
</div>

<div class="step" data-step="50">
  Stabilitate
  <span class="check">✔</span>
</div>

<div class="step" data-step="75">
  Funcționalități
  <span class="check">✔</span>
</div>

<div class="step" data-step="95">
  Finisaj
  <span class="check">✔</span>
</div>

<div class="step" data-step="100">
  Ultimele Ajustări
  <span class="check">✔</span>
</div>

</div>

<div class="footer">
© 2026 portoSYNC
</div>

</div>

</div>

<script>

// 🔧 AICI controlezi progresul (schimbi manual)
let progress = 96; // ← modifici aici (ex: 20, 50, 80, etc)

document.getElementById("bar").style.width = progress + "%";

let steps = document.querySelectorAll(".step");

steps.forEach(step => {
  let value = parseInt(step.getAttribute("data-step"));

  if(progress >= value){
    step.classList.add("done");
  }
});

</script>

</body>
</html>
