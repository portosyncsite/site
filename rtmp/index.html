<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>portoSYNC</title>
  <link rel="icon" href="portoSYNC.png" type="image/png" />
  <link rel="apple-touch-icon" sizes="180x180" href="PortoSyncfav.png">

<style>

/* ===== RESET ===== */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
}

/* ===== VIDEO FULL SCREEN ===== */
#bgVideo {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== WATERMARK PNG OBLIC ===== */
#watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-25deg);
  opacity: 0.15;
  pointer-events: none;
  z-index: 10;
}

#watermark img {
  width: 400px;      /* 🔥 mărimea watermark-ului */
  max-width: 80vw;
  height: auto;
}

/* ===== Fix iPhone autoplay ===== */
@supports (-webkit-touch-callout: none) {
  #bgVideo {
    transform: translateZ(0);
  }
}

</style>
</head>
<body>

<!-- VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="1772819655702458.mp4" type="video/mp4">
</video>

<script>
document.addEventListener("click", () => {
  document.getElementById("bgVideo").play().catch(() => {});
});
</script>

</body>
</html>
