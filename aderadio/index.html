<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ade Radio</title>
<link rel="icon" href="radio-media.png" type="image/png" />
<link rel="apple-touch-icon" sizes="180x180" href="radio-media.png">

<style>

/* ===== FONT ===== */
@font-face {
  font-family: 'PortoSync';
  src: url('AvenirLTProHeavy.otf') format('opentype');
}

/* ===== RESET ===== */
* {
  box-sizing: border-box;
  font-family: 'PortoSync', sans-serif;
}

/* ===== BODY ===== */
body {
  margin: 0;
  min-height: 100dvh;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  overflow: hidden;
}

/* ===== VIDEO BACKGROUND ===== */
#bgVideo {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  pointer-events: none;
}

/* overlay (păstrează lizibilitatea) */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: -1;
}

/* ===== PLAYER ===== */
.player {
  width: 100%;
  max-width: 380px;
  padding: 26px;
  border-radius: 36px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.35);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.footer {
  text-align: center;
  margin: 10px 0 15px 0;
  font-size: 1rem;
}

/* ===== LOGO ===== */
#radioLogo {
  width: 140px;
}

/* ===== LIVE ===== */
.live {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: 800;
  letter-spacing: 1px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.4);
}

.live span {
  width: 10px;
  height: 10px;
  background: #ff3b3b;
  border-radius: 50%;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: .6; }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== INFO ===== */
.track {
  text-align: center;
}

#title {
  font-size: 1.1rem;
  font-weight: 800;
}

#artist {
  font-size: 0.9rem;
  opacity: .8;
}

/* ===== CONTROLS ===== */
.controls {
  display: flex;
  align-items: center;
  gap: 16px;
}

button {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 1.4rem;
  color: #fff;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.4);
}

input[type=range] {
  width: 90px;
}

/* ===== RADIO SWITCH ===== */
.radio-switch {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.radio-switch button {
  width: auto;
  height: auto;
  padding: 8px 14px;
  border-radius: 16px;
  font-size: .85rem;
}

/* ===== AD ===== */
.ad-banner {
  border-radius: 24px;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.25);
}

.ad-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

</style>
</head>

<body>

<!-- 🔥 VIDEO BACKGROUND (NOU) -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="background.mp4" type="video/mp4">
</video>

<div class="player">

  <img id="radioLogo" src="radio.png" alt="Radio">

  <div class="live"><span></span> LIVE</div>

  <div class="ad-banner">
    <img id="adImage" src="ad1.png">
  </div>

  <div class="track">
    <div id="title">Ade Radio</div>
    <div id="artist">Ascultă acum</div>
  </div>

  <div class="controls">
    <button id="play">▶</button>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
  </div>

  <div class="radio-switch">
    <button onclick="selectRadio(0)">Ade Radio</button>
  </div>

  <div class="footer">
    Făcut de Porto cu 🤍 | © 2026, Ade Media
  </div>

</div>

<script>

/* ===== ELEMENTS ===== */
const playBtn = document.getElementById("play");
const volume = document.getElementById("volume");
const titleEl = document.getElementById("title");
const artistEl = document.getElementById("artist");
const logoEl = document.getElementById("radioLogo");

/* ===== STATE ===== */
let audio = null;
let isPlaying = false;
let rotateInterval = null;
let currentRadio = 0;

const ads = ["ad1.png","ad2.png","ad3.png"];
let adIndex = 0;
const adImage = document.getElementById("adImage");

setInterval(() => {
  adIndex = (adIndex + 1) % ads.length;
  adImage.src = ads[adIndex];
}, 5000);

/* ===== RADIO DATA ===== */
const radios = [
  {
    name: "Ade Radio",
    stream: "https://stream-172.zeno.fm/fcdm6igj1svtv?zt=eyJhbGciOiJIUzI1NiJ9",
    logo: "radio.png",
    mediaLogo: "radio-media.png"
  }
];

logoEl.src = radios[0].logo;
titleEl.textContent = radios[0].name;

/* ===== PLAY / PAUSE ===== */
playBtn.onclick = () => {
  if (!audio) {
    audio = new Audio();
    audio.preload = "none";
    audio.playsInline = true;
    audio.volume = volume.value;
  }

  if (!isPlaying) {
    audio.src = radios[currentRadio].stream;
    audio.play();

    isPlaying = true;
    playBtn.textContent = "⏸";

    startMetadataRotation();
    updateNowPlaying("LIVE");
  } else {
    audio.pause();
    isPlaying = false;
    playBtn.textContent = "▶";
  }
};

volume.oninput = () => {
  if (audio) audio.volume = volume.value;
};

/* ===== SWITCH RADIO ===== */
function selectRadio(index) {
  currentRadio = index;
  logoEl.src = radios[index].logo;
  titleEl.textContent = radios[index].name;

  if (isPlaying && audio) {
    audio.src = radios[index].stream;
    audio.play();
    updateNowPlaying("LIVE");
  }
}

/* ===== RDS / MEDIA ===== */
function updateNowPlaying(text) {
  artistEl.textContent = text;

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: radios[currentRadio].name,
      artist: text,
      album: "LIVE RADIO",
      artwork: [
        {
          src: radios[currentRadio].mediaLogo,
          sizes: "512x512",
          type: "image/png"
        }
      ]
    });
  }
}

/* ===== ROTATION ===== */
function startMetadataRotation() {
  if (rotateInterval) return;

  const messages = [
    "ascultă",
    "hiturile",
    "tale",
    "numărul 1",
    "doar pe",
    "aderadio.prtsync.ro"
  ];

  let i = 0;

  rotateInterval = setInterval(() => {
    if (isPlaying) {
      updateNowPlaying(messages[i]);
      i = (i + 1) % messages.length;
    }
  }, 5000);
}

</script>

</html>
