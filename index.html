<html lang="ro"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>portoSYNC</title>
<meta name="description" content="PORTOsync - Primul IPTV din Vrancea">
<meta name="keywords" content="portosync, ade plus, vrancea, iptv">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" content="PORTOsync">
<meta property="og:description" content="PORTOsync - Primul IPTV din Vrancea">
<meta property="og:url" content="https://portosync.eu">
<meta property="og:image" content="https://portosync.eu/18yearsd.png">

  <link rel="icon" href="PortoSyncfav.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="PortoSyncfav.png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Box login/register */
    #loginBox {
      max-width: 400px;
      margin: 80px auto;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      color: #fff;
      /* text alb */
    }

    #loginBox img {
      max-width: 180px;
      margin-bottom: 20px;
    }

    #loginBox input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #fff;
      font-size: 16px;
      background: transparent;
      /* transparent */
      color: #fff;
      /* text alb */
    }

    #loginBox input::placeholder {
      color: #fff;
      /* placeholder alb deschis */
    }

    #loginBox button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #fff;
      /* contur alb */
      background: transparent;
      /* transparent */
      color: #fff;
      /* text alb */
      cursor: pointer;
      font-weight: bold;
    }

    #loginBox button:hover {
      background: rgba(255, 255, 255, 0.1);
      /* efect hover discret */
    }

    /* Link-uri &#537;i text alb login/register */
    #loginBox a,
    #loginBox h3,
    #loginBox p {
      color: #fff;
    }

    #loginBox a {
      text-decoration: none;
      font-weight: bold;
    }

    #loginBox a:hover {
      color: #fff;
      text-decoration: underline;
    }

    /* Mesaj succes PayPal */
    #paypalSuccess {
      display: none;
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      background: #e6ffe6;
      color: #fff;
      font-weight: bold;
      text-align: center;
    }

    /* Logo-uri pl&#259;&#539;i */
    .payment-logos {
      margin-top: 15px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .payment-logos img {
      height: 28px;
    }
  </style>
</head>

<body>

  <!-- Pagina de login -->
  <div id="loginPage">
    <div id="loginBox">
      <img id="logo" src="PortoSyncWHITE.png" alt="Logo PORTOsync">

      <!-- Login -->
      <div id="loginForm">
        <input type="text" id="username" placeholder="utilizator" autocomplete="username">
        <input type="password" id="password" placeholder="parola" autocomplete="current-password">
        <button id="loginBtn">CONECTARE</button>
        <div id="loginError" style="display:none; color:#fff;">UTILIZATOR SAU PAROLA GREȘITĂ!</div>
      </div>

      <!-- Register (abonamente link) -->
      <div id="registerForm" style="display: none;">
        <h3>Înregistreaza-te</h3>
        <p>Alege abonamentul dorit:</p>

        <div class="subscription-links">
          <a href="https://www.paypal.com/webapps/billing/plans/subscribe?plan_id=P-9KM51774PS7815540NDCQRQY" class="subscription-btn">Abonament Lunar</a>
          <a href="https://www.paypal.com/webapps/billing/plans/subscribe?plan_id=P-6F043808MG493724VNDHOO3A" class="subscription-btn">Abonament Anual</a>
        </div>

        <div class="payment-logos">
          <img src="Visa.svg" alt="Visa">
          <img src="Mastercard.svg" alt="MasterCard">
          <img src="Maestro.svg" alt="Maestro">
          <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
        </div>

        <p>Ai deja cont? <a href="#" id="showLogin">Conecteaza-te</a></p>
      </div>
    </div>
  </div>

  <!-- Aplica&#539;ia -->
  <div id="app" style="display: none;">
    <header>
      <img id="logo" src="PortoSyncWHITE.png" alt="Logo PORTOsync">
      <input type="text" id="search" placeholder="hai să căutăm :)">
      <div class="user-menu" id="userMenu">
        <div class="user-icon" id="userIcon">...</div>
        <div class="user-name" id="userName">UTILIZATOR PORTOsync</div>
        <div class="dropdown-menu" id="dropdownMenu">
        <button onclick="window.location.href='https://cna.ro'">CNA</button>
        <button onclick="window.location.href='https://anpc.ro'">ANPC</button>
<button onclick="window.location.href='mailto:contact@prtsync.ro'">CONTACT</button>
<button onclick="window.location.href='https://lucianabalcu.ro'">AVOCAT PORTOsync</button>
<button onclick="window.location.href='https://banatsync.com'">BanatSync</button>
        <button onclick="window.location.href='https://ademedia.ro'">Ade Media</button>
<button onclick="window.location.href='https://player.ademedia.ro'">Ade Player</button>
        <button id="logoutBtn">DECONECTARE</button>
      </div>
    </div>
  </header>

    <div class="container">
      <div class="channel-list" id="channelList"></div>
      <div class="player-section" id="playerSection">
        <video id="playerVideo" controls="" autoplay="" muted="" playsinline=""></video>
        <audio id="playerAudio" controls="" autoplay=""></audio>
        <div id="channelDescription"></div>


      </div>
    </div>
  </div>

  <!-- Modal pentru parol&#259; canal -->
  <div id="passwordModal" style="display:none;">
    <div class="modal-box">
      <h2>INTRODU PAROLA PENTRU ACCES LA CANAL</h2>
      <div class="password-container">
        <input type="password" id="channelPasswordInput" placeholder="Introduceți parola">
      </div>
      <button id="submitChannelPassword">CONFIRMĂ</button>
      <div id="channelPasswordError">PAROLA GREȘITĂ!</div>
    </div>
  </div>

  <div class="footer"> Făcut de Porto 🤍 | © 2026, portoSYNC </div>

  <script>
    // Toggle Login/Register
    document.getElementById("showRegister").addEventListener("click", function (e) {
      e.preventDefault();
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "block";
    });

    document.getElementById("showLogin").addEventListener("click", function (e) {
      e.preventDefault();
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
    });

    // PayPal
    paypal.Buttons({
      style: {
        shape: 'pill',
        color: 'white',
        layout: 'horizontal',
        label: 'subscribe'
      },
      createSubscription: function (data, actions) {
        return actions.subscription.create({
          plan_id: 'P-9KM51774PS7815540NDCQRQY'
        });
      },
      onApprove: function (data, actions) {
        document.getElementById("paypalSuccess").style.display = "block";
        setTimeout(() => {
          window.location.href = "multumim.html";
        }, 2000);
      }
    }).render('#paypal-button-container-P-9KM51774PS7815540NDCQRQY');

    // Login simplu
    document.getElementById("loginBtn").addEventListener("click", function () {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      if (user && pass) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("userName").innerText = user;
      } else {
        document.getElementById("loginError").style.display = "block";
      }
    });

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", function () {
      document.getElementById("app").style.display = "none";
      document.getElementById("loginPage").style.display = "block";
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="test.js"></script>
  <script src="canale.js"></script>
  <script src="sw.js"></script>
